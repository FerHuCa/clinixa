# Automated version of the manual post-deploy production check.
# Runs scripts/smoke-prod.mjs (READ-ONLY) against live prod on a schedule.
# On failure, GitHub notifies maintainers via the standard failed-workflow email.
name: Smoke (prod)

on:
  schedule:
    - cron: "17 * * * *" # hourly, at :17
  workflow_dispatch:

concurrency:
  group: smoke-prod
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No dependencies — run the script directly (no npm ci).
      - run: node scripts/smoke-prod.mjs
